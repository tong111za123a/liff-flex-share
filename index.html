<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>😍🖤➣ໂのနတՃั่Ձ¹✯🖤😍</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:sans-serif;
  background:url('https://i.postimg.cc/j5Gkxs3K/IMG-1275.gif') center/cover fixed;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}
.panel{
  width:92%;
  max-width:360px;
  background:rgba(0,0,0,.85);
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow: 0 0 20px rgba(0,255,255,0.2);
}
input{
  width:90%;
  padding:12px;
  margin-top:10px;
  background:#111;
  color:#fff;
  border:1px solid #333;
  border-radius:8px;
  outline:none;
}
input:focus{ border-color:#0ff; }
button{
  width:100%;
  margin-top:12px;
  padding:12px;
  font-size:15px;
  background:#000;
  color:#0ff;
  border:1px solid #0ff;
  border-radius:8px;
  cursor:pointer;
  transition: 0.3s;
}
button:hover{
  background:#0ff;
  color:#000;
}
.qr img{
  width:150px;
  margin-top:15px;
  border:2px solid #0ff;
  border-radius:10px;
}
.hidden{display:none;}
.small{
  font-size:12px;
  color:#0ff;
  word-break:break-all;
  margin-top:10px;
}
hr{
  border: 0;
  height: 1px;
  background: #333;
  margin: 20px 0;
}
#loading{ font-size: 18px; color: #0ff; }
</style>
</head>

<body>

<div id="loading">กำลังตรวจสอบสิทธิ์...</div>

<div class="panel hidden" id="mainPanel">
  <h3 id="greeting">สวัสดี</h3>
  
  <p class="small">ใส่ลิงก์รูปภาพ เว้นวรรค ตามด้วยไอดีไลน์</p>
  <input id="genInput" placeholder="URLรูปภาพ ไอดีไลน์">

  <button onclick="sendFlex()">แชร์ Flex</button>
  <button onclick="window.location.href='https://pic.in.th/?lang=th'"
    style="border-color:#ff00ff;color:#ff00ff">
    ฝากรูปภาพ
  </button>

  <hr>

  <button onclick="checkMyUserId()">🔍 เช็ค UserID ของฉัน</button>
  <div id="myUserId" class="small"></div>
</div>

<div class="panel hidden" id="denyPanel">
  <h3 style="color:#ff4444;">⛔ ไม่มีสิทธิ์เข้าใช้งาน</h3>
  <p class="small">UserID ของคุณยังไม่ได้เปิดระบบ<br>กรุณาติดต่อผู้สร้างเพื่อสมัครสมาชิก</p>
  
  <div id="myUserIdDeny" class="small" style="background:#222; padding:5px; margin-bottom:10px;"></div>

  <button onclick="contactCreator()">➕ แอด LINE ผู้สร้าง</button>
  <div class="qr">
    <img src="https://img5.pic.in.th/file/secure-sv1/IMG_12468d6ce5b9565e3489.jpeg">
  </div>
</div>

<script>
/* ========== ตั้งค่า ========== */

const LIFF_ID = "2008621627-1eN2VA2x";
const ADMIN_LINE = "mc357.com";

// ✅ รายชื่อผู้มีสิทธิ์
const WHITELIST = [
  { name: "ผู้สร้างระบบ", userId: "Ua48c35a3cd7641afee1d85c317032ad5" },
  { name: "บัญชีทดสอบ", userId: "Uffa99b9ba90b2d097eb5300c6a521560" },
  { name: "𝗔𝗱𝗺𝗶𝗻𝗠𝗼𝗻𝗲𝘆13/3/69/500", userId: "U4c62af53085fb04354787d16c7826073" }
];

/* ============================ */

async function main() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  const user = WHITELIST.find(w => w.userId === profile.userId);

  document.getElementById("loading").classList.add("hidden");

  if (user) {
    // ผ่านการตรวจสอบ
    document.getElementById("mainPanel").classList.remove("hidden");
    document.getElementById("greeting").innerText = "สวัสดีคุณ " + (user.name || profile.displayName);
  } else {
    // ไม่ผ่าน
    document.getElementById("denyPanel").classList.remove("hidden");
    document.getElementById("myUserIdDeny").innerText = `{ name: "${profile.displayName}", userId: "${profile.userId}" },`;
  }
}

main();

function contactCreator(){
  location.href = "https://line.me/ti/p/~" + ADMIN_LINE;
}

async function checkMyUserId(){
  const p = await liff.getProfile();
  const text = `{ name: "${p.displayName}", userId: "${p.userId}" },`;
  document.getElementById("myUserId").innerText = text;
}

async function sendFlex(){
  if(!liff.isInClient()) return alert("⚠ กรุณาเปิดผ่านแอป LINE เท่านั้น");

  const inputVal = document.getElementById("genInput").value.trim();
  const raw = inputVal.split(" ");
  
  if(raw.length < 2) return alert("❌ รูปแบบผิด! กรุณาใส่: URLรูปภาพ ไอดีไลน์");

  const flexMsg = {
    type:"flex",
    altText:"สนใจติดต่อ_lineid: mc357.com",
    contents:{
      type:"bubble",
      hero:{
        type:"image",
        url:raw[0],
        size:"full",
        aspectMode:"cover",
        aspectRatio:"2:3"
      },
      action:{
        type:"uri",
        uri:"https://line.me/ti/p/~"+raw[1]
      }
    }
  };

  try {
    await liff.shareTargetPicker([flexMsg]);
  } catch (error) {
    console.error("Error sending flex:", error);
  }
}
</script>

</body>
</html>
