<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>😍🖤➣ໂのနတՃั่Ձ¹✯🖤😍</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:sans-serif;
  background:url('https://i.postimg.cc/j5Gkxs3K/IMG-1275.gif') center/cover fixed;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}
.panel{
  width:92%;
  max-width:360px;
  background:rgba(0,0,0,.75);
  padding:15px;
  border-radius:10px;
  text-align:center;
}
input{
  width:95%;
  padding:10px;
  margin-top:8px;
  background:#222;
  color:#fff;
  border:none;
  border-radius:5px;
}
button{
  margin-top:10px;
  padding:10px;
  font-size:15px;
  background:#000;
  color:#0ff;
  border:1px solid #0ff;
  border-radius:5px;
}
button:hover{
  background:#0ff;
  color:#000;
}
.qr img{
  width:150px;
  margin-top:10px;
  border:2px solid #0ff;
  border-radius:8px;
}
.hidden{display:none;}
.small{
  font-size:12px;
  color:#0ff;
  word-break:break-all;
}
hr{
  border-color:#333;
  margin:15px 0;
}
</style>
</head>

<body>

<!-- 🔐 หน้าใส่รหัส -->
<div class="panel" id="loginPanel">
  <h3>🔐 ใส่รหัสผ่าน</h3>
  <input type="password" id="password" placeholder="รหัสผ่านเข้าใช้งาน">
  <button onclick="checkAccess()">เข้าใช้งาน</button>

  <hr>

  <!-- ➕ ติดต่อ + QR -->
  <button onclick="contactCreator()">สนใจสมัคร 500/เดือน คลิก!</button>
  <div class="qr">
    <img src="https://img5.pic.in.th/file/secure-sv1/IMG_12468d6ce5b9565e3489.jpeg">
    <p class="small">สแกนแอด LINE ผู้สร้าง เพื่อสมัครสมาชิก</p>
  </div>

  <hr>

  <!-- 🔍 เช็ค UserID -->
  <button onclick="checkMyUserId()">🔍 เช็ค UserID ของฉัน</button>
  <div id="myUserId" class="small"></div>
</div>

<!-- ❌ ไม่มีสิทธิ์ -->
<div class="panel hidden" id="denyPanel">
  <h3>⛔ ไม่มีสิทธิ์เข้าใช้งาน</h3>
  <p class="small">กรุณาติดต่อผู้สร้างเพื่อสมัครสมาชิก</p>
  <button onclick="contactCreator()">➕ แอด LINE ผู้สร้าง</button>
  <div class="qr">
    <img src="https://img5.pic.in.th/file/secure-sv1/IMG_12468d6ce5b9565e3489.jpeg">
  </div>
</div>

<!-- ✅ หน้าใช้งานจริง -->
<div class="panel hidden" id="mainPanel">
  <h3 id="greeting">สวัสดี</h3>

  <p class="small">ใส่ลิงก์รูปภาพ เว้นวรรค ตามด้วยไอดีไลน์</p>
  <input id="genInput" placeholder="URLรูปภาพ ไอดีไลน์">

  <button onclick="sendFlex()">แชร์ Flex</button>
  <button onclick="window.location.href='https://pic.in.th/?lang=th'"
    style="border-color:#ff00ff;color:#ff00ff">
    ฝากรูปภาพ
  </button>

  <hr>

  <!-- 🔍 เช็ค UserID ในหน้าใช้งาน -->
  <button onclick="checkMyUserId()">🔍 เช็ค UserID</button>
  <div id="myUserId2" class="small"></div>
</div>

<script>
/* ========== ตั้งค่า ========== */

// 🔴 LIFF ID
const LIFF_ID = "2008621627-1eN2VA2x";

// 🔐 รหัสผ่าน
const PASSWORD = "357000";

// 👑 LINE ผู้สร้าง
const ADMIN_LINE = "mc357.com";

// ✅ ผู้มีสิทธิ์ (ชื่อ + UserID)
const WHITELIST = [
  { name: "ผู้สร้างระบบ", userId: "Ua48c35a3cd7641afee1d85c317032ad5" },
  { name: "บัญชีทดสอบ", userId: "Uffa99b9ba90b2d097eb5300c6a521560" },
   name: "𝗔𝗱𝗺𝗶𝗻𝗠𝗼𝗻𝗲𝘆13/3/69/500", userId: "U4c62af53085fb04354787d16c7826073" }
];

/* ============================ */

liff.init({ liffId: LIFF_ID });

async function checkAccess(){
  if(document.getElementById("password").value.trim() !== PASSWORD){
    return deny();
  }

  if(!liff.isLoggedIn()) liff.login();
  const p = await liff.getProfile();

  const allowedUser = WHITELIST.find(w => w.userId === p.userId);
  if(!allowedUser) return deny();

  loginPanel.classList.add("hidden");
  mainPanel.classList.remove("hidden");

  greeting.innerText =
    "สวัสดีคุณ " + (allowedUser.name || p.displayName);
}

function deny(){
  loginPanel.classList.add("hidden");
  mainPanel.classList.add("hidden");
  denyPanel.classList.remove("hidden");
}

function contactCreator(){
  location.href = "https://line.me/ti/p/~" + ADMIN_LINE;
}

// 🔍 เช็ค UserID (เอาไปเพิ่ม whitelist)
async function checkMyUserId(){
  if(!liff.isLoggedIn()) liff.login();
  const p = await liff.getProfile();

  const text =
`{ name: "${p.displayName}", userId: "${p.userId}" },`;

  document.getElementById("myUserId").innerText = text;
  const el2 = document.getElementById("myUserId2");
  if(el2) el2.innerText = text;
}

// ส่ง Flex
async function sendFlex(){
  if(!liff.isInClient()) return alert("⚠ เปิดผ่าน LINE");

  const raw = genInput.value.trim().split(" ");
  if(raw.length < 2) return alert("❌ format ผิด");

  const flexMsg = {
    type:"flex",
    altText:"สนใจติดต่อ_lineid: mc357.com",
    contents:{
      type:"bubble",
      hero:{
        type:"image",
        url:raw[0],
        size:"full",
        aspectMode:"cover",
        aspectRatio:"2:3"
      },
      action:{
        type:"uri",
        uri:"https://line.me/ti/p/~"+raw[1]
      }
    }
  };

  await liff.shareTargetPicker([flexMsg]);
}
</script>

</body>
</html>
